name: Score Submission

on:
  pull_request:
    paths:
      - 'submissions/*.enc'

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn pycryptodome pyyaml tabulate

      - name: Run Evaluation
        id: eval
        env:
          TEST_LABELS: ${{ secrets.TEST_LABELS }}
          RSA_PRIVATE_KEY: ${{ secrets.RSA_PRIVATE_KEY }}
        run: |
          # 1. Detect if any existing files were modified or deleted (Tempering Check)
          # This looks for any change that is NOT an "A" (Added) status
          TAMPERED_FILES=$(git diff --name-status origin/main...HEAD | grep 'submissions/' | grep -v '^A' || true)
          
          if [ -n "$TAMPERED_FILES" ]; then
            echo "score=Security Error" >> $GITHUB_OUTPUT
            echo "multi_note=❌ **Security Warning:** Existing submission files were modified or deleted. Only NEW file additions are allowed. Please revert changes to previous files to proceed." >> $GITHUB_OUTPUT
            exit 1
          fi

          # 2. Get only NEWLY added files with timestamps
          # --diff-filter=A ensures we only look at newly created files
          NEW_FILES_WITH_TIME=$(git log --diff-filter=A --format="%ct" --name-only origin/main...HEAD | awk '
            /^[0-9]+$/ { current_time=$1; next }
            /\.enc$/ { print current_time, $0 }
          ' | sort -nr)

          if [ -z "$NEW_FILES_WITH_TIME" ]; then
            echo "score=No New Submission" >> $GITHUB_OUTPUT
            echo "multi_note=ℹ️ No new .enc submission files detected in this PR." >> $GITHUB_OUTPUT
            exit 1
          fi

          # 3. Select the latest added file
          FILE=$(echo "$NEW_FILES_WITH_TIME" | head -n 1 | cut -d' ' -f2-)
          COUNT=$(echo "$NEW_FILES_WITH_TIME" | cut -d' ' -f2- | sort -u | wc -l)

          # 4. Prepare the note for the PR
          if [ "$COUNT" -gt 1 ]; then
            NOTE="⚠️ **Multiple entries found:** $COUNT new files were added, but we are taking the latest file based on git add time: \`$FILE\`."
          else
            NOTE="✅ Evaluating new submission: \`$FILE\`"
          fi
          echo "multi_note=$NOTE" >> $GITHUB_OUTPUT

          # 5. Extraction and Scoring
          FILENAME=$(basename "$FILE")
          TEAM_NAME="${FILENAME%.*}"
          echo "team_name=$TEAM_NAME" >> $GITHUB_OUTPUT
          
          python competition/evaluate.py --file "$FILE" | tee out.txt
          RAW_SCORE=$(grep "SCORE_MAE" out.txt | awk '{print $2}')
          
          if [ -z "$RAW_SCORE" ] || [ "$RAW_SCORE" == "None" ]; then
            echo "score=Error" >> $GITHUB_OUTPUT
          else
            FORMATTED_SCORE=$(printf "%.8f" $RAW_SCORE)
            echo "score=$FORMATTED_SCORE" >> $GITHUB_OUTPUT
          fi
          
      - name: Post Score to PR
        uses: mshick/add-pr-comment@v2
        if: always()
        with:
          message: |
            ## 🧠 Brain-Age GNN Submission Result
            
            **Team:** `${{ steps.eval.outputs.team_name || 'Unknown' }}`
            **Score (MAE):** `${{ steps.eval.outputs.score }}`
            
            ${{ steps.eval.outputs.multi_note }}