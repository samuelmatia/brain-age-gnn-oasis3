name: Score Submission

on:
  push:
    branches:
      - main
    paths:
      - 'submissions/**'
      - '!submissions/README.md'
  pull_request:
    paths:
      - 'submissions/**'
      - '!submissions/README.md'

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pandas scikit-learn pyyaml pycryptodome tabulate

      - name: Run Evaluation
        id: eval_step
        env:
          TEST_LABELS: ${{ secrets.TEST_LABELS }}
          RSA_PRIVATE_KEY: ${{ secrets.RSA_PRIVATE_KEY }}
        run: |
          # 1. SMART DETECTION: Find the .enc file
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            SUBMISSION_FILE=$(git diff --name-only origin/main...HEAD | grep 'submissions/.*\.enc$' | head -n 1)
          else
            SUBMISSION_FILE=$(git diff --name-only HEAD^ HEAD | grep 'submissions/.*\.enc$' | head -n 1)
          fi

          if [ -z "$SUBMISSION_FILE" ]; then 
            SUBMISSION_FILE=$(find submissions -name "*.enc" -printf '%T+ %p\n' | sort -r | head -n 1 | cut -d' ' -f2)
          fi

          if [ -z "$SUBMISSION_FILE" ]; then 
            echo "ERROR: No submission file found."
            exit 1
          fi

          # --- FIX STARTS HERE ---
          # Get filename without path and without extension
          # submissions/team_alpha.enc -> team_alpha
          FILENAME=$(basename "$SUBMISSION_FILE")
          TEAM_NAME="${FILENAME%.*}" 
          # --- FIX ENDS HERE ---

          echo "Detected Team: $TEAM_NAME"
          
          python competition/evaluate.py --file "$SUBMISSION_FILE" | tee evaluation_output.txt
          
          SCORE=$(grep "SCORE_MAE" evaluation_output.txt | awk '{print $2}')
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "team_name=$TEAM_NAME" >> $GITHUB_OUTPUT
          
      - name: Post Score to PR
        if: github.event_name == 'pull_request'
        uses: mshick/add-pr-comment@v2
        with:
          message: |
            ## 🧠 Brain-Age GNN Submission Result
            **Team:** `${{ steps.eval_step.outputs.team_name }}`
            **Score (MAE):** `${{ steps.eval_step.outputs.score || 'Error Computing Score' }}`
            
            ---
            *Note: The leaderboard will only be updated once a maintainer merges this Pull Request.*

      - name: Commit and Push Leaderboard (Merge Phase)
        if: github.event_name == 'push' && steps.eval_step.outputs.score != ''
        env:
          TEST_LABELS: ${{ secrets.TEST_LABELS }} 
        run: |
          git config user.name "Leaderboard Bot"
          git config user.email "actions@github.com"
          
          git fetch origin main
          git checkout main
          git pull origin main --rebase
          
          python update_leaderboard.py
          
          # CRITICAL: Add the docs folder
          git add leaderboard/
          git add docs/
          
          git commit -m "Auto-update leaderboard [skip ci]" || exit 0
          git push origin main