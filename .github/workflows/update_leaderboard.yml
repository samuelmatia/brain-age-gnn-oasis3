name: Update Leaderboard

on:
  push:
    branches:
      - main
    # Removed strict paths filter to ensure it catches every merge to main
  workflow_dispatch: # Allows you to manually trigger via the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so git diff/commit works properly

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pycryptodome tabulate

      - name: Debug Environment & Run Script
        env:
          TEST_LABELS: ${{ secrets.TEST_LABELS }}
          RSA_PRIVATE_KEY: ${{ secrets.RSA_PRIVATE_KEY }}
        run: |
          echo "📂 Current working directory: $(pwd)"
          echo "📁 Listing submissions folder:"
          ls -R submissions/ || echo "Submissions folder not found"
          python update_leaderboard.py

      - name: Commit and Push Changes
        run: |
          git config --local user.name "Leaderboard Bot"
          git config --local user.email "actions@github.com"
          
          # Force add all generated files
          git add -f leaderboard/leaderboard.csv leaderboard/LEADERBOARD.md docs/leaderboard.html
          
          # Only commit if changes exist
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Leaderboard [skip ci]"
            git push origin main
          fi